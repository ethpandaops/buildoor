name: Reusable check workflow
on:
  workflow_call:

permissions:
  contents: read

# shared check jobs (code checks only — the Kurtosis E2E lives in
# _shared-e2e.yaml and runs on PRs only, not on branch builds)
jobs:
  check_source:
    name: Run code checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    # setup global dependencies
    - name: Set up go
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version: 1.25.x
    - name: Set up node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 20.x
    - name: Cache node-modules for UI package
      id: cache-npm
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ./pkg/webui/node_modules
        key: webui-npm-${{ runner.os }}-${{ hashFiles('./pkg/webui/package-lock.json') }}
        restore-keys: |
          webui-npm-${{ runner.os }}-
          webui-npm-

    # build UI package (the bundle is gitignored and go:embed needs it)
    - name: Build UI package
      run: |
        make build-ui

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

    - name: Check go fmt
      run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi

    - name: Install staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest
    - name: Run staticcheck
      run: staticcheck ./...

    #- name: Install golint
    #  run: go install golang.org/x/lint/golint@latest
    #- name: Run golint
    #  run: golint ./...

    - name: Run tests
      run: go test -race -vet=off ./...
