  api.StatsResponse:
    properties:
      bids_submitted:
        type: integer
      bids_won:
        type: integer
      blocks_included:
        type: integer
      builder_api_blocks_published:
        type: integer
      builder_api_headers_requested:
        description: Builder API stats
        type: integer
      builder_api_registered_validators:
        type: integer
      reveals_failed:
        type: integer
      reveals_skipped:
        type: integer
      reveals_success:
        type: integer
      slots_built:
        type: integer
      total_paid_gwei:
        type: integer
    type: object
  api.StatusResponse:
    properties:
      builder_index:
        type: integer
      builder_pubkey:
        type: string
      cl_balance_gwei:
        type: integer
      current_slot:
        type: integer
      deposit_epoch:
        type: integer
      effective_balance_gwei:
        type: integer
      is_registered:
        type: boolean
      lifecycle_enabled:
        type: boolean
      pending_payments_gwei:
        type: integer
      running:
        type: boolean
      wallet_address:
        type: string
      wallet_balance_wei:
        type: string
      withdrawable_epoch:
        type: integer
    type: object
  api.TestTransformRequest:
    properties:
      expression:
        description: Expression is the jq program to evaluate.
        type: string
      sample_slot:
        description: |-
          SampleSlot, when > 0, sources the input from that slot's captured
          artifact (falling back to a template when it is unavailable).
        type: integer
      target:
        description: Target is one of payload | bid | envelope.
        type: string
    type: object
  api.TestTransformResponse:
    properties:
      error:
        description: Error is the parse/eval error message (present when the expression
          fails).
        type: string
      input:
        description: |-
          Input is the JSON the expression ran against (message JSON for bid /
          envelope; the payload for payload), pretty-printed as a string.
        type: string
      input_source:
        description: InputSource is "artifact:slot-N" or "template".
        type: string
      output:
        description: Output is the transform result, pretty-printed (present when
          Error is empty).
        type: string
      target:
        type: string
    type: object
  api.UpdateActionPlanRequest:
    properties:
      updates:
        items:
          $ref: '#/definitions/action_plan.PlanUpdate'
        type: array
    type: object
  api.UpdateActionPlanResponse:
    properties:
      plans:
        items:
          $ref: '#/definitions/action_plan.SlotPlan'
        type: array
      slots:
        items:
          type: integer
        type: array
      status:
        type: string
    type: object
  api.UpdateEPBSRequest:
    properties:
      bid_end_time:
        type: integer
      bid_increase:
        type: integer
      bid_interval:
        type: integer
      bid_min_amount:
        type: integer
      bid_start_time:
        type: integer
      bid_subsidy:
        type: integer
      build_start_time:
        type: integer
      payload_build_delay:
        type: integer
      reveal_time:
        type: integer
    type: object
  api.UpdateScheduleRequest:
    properties:
      every_nth:
        type: integer
      mode:
        type: string
      next_n:
        type: integer
      start_slot:
        type: integer
    type: object
  api.ValidatorRegistrationResponse:
    description: Returns the list of validators registered via the Builder API (fee
      recipient preferences). Not paginated.
    properties:
      fee_recipient:
        description: Hex-encoded Ethereum address
        type: string
      gas_limit:
        description: Gas limit for blocks
        type: integer
      pubkey:
        description: Hex-encoded BLS public key
        type: string
      timestamp:
        description: Unix timestamp
        type: integer
    type: object
  db.AuditLog:
    properties:
      action:
        type: string
      actor:
        type: string
      detail:
        type: string
      id:
        type: integer
      remote_addr:
        type: string
      result:
        type: string
      target:
        type: string
      timestamp:
        type: integer
    type: object
  payload_bidder.WonBlock:
    properties:
      block_hash:
        type: string
      num_blobs:
        type: integer
      num_transactions:
        type: integer
      slot:
        type: integer
      source:
        type: string
      timestamp:
        description: Unix milliseconds at inclusion time
        type: integer
      value_eth:
        type: string
      value_wei:
        type: string
    type: object
  slot_results.BidAttempt:
    properties:
      artifact_index:
        description: |-
          ArtifactIndex references the slot's stored 'bid' SSZ artifact; nil when
          no artifact exists (suppressed, pre-construction failure, or capture
          disabled/failed).
        type: integer
      at:
        type: string
      competitor_high_gwei:
        description: |-
          CompetitorHighGwei is the highest known competitor bid at submission
          time (p2p only, our own builder index excluded).
        type: integer
      error:
        type: string
      execution_payment_gwei:
        type: integer
      status:
        $ref: '#/definitions/slot_results.BidStatus'
      total_value_gwei:
        type: integer
      transport:
        description: payload_builder.BidTransport values
        type: string
    type: object
  slot_results.BidStatus:
    enum:
    - suppressed
    - constructed
    - submitted
    - served
    - failed
    - cancelled
    type: string
    x-enum-varnames:
    - BidStatusSuppressed
    - BidStatusConstructed
    - BidStatusSubmitted
    - BidStatusServed
    - BidStatusFailed
    - BidStatusCancelled
  slot_results.BlockSubmission:
    properties:
      at:
        type: string
      dialect:
        description: '"legacy" | "epbs"'
        type: string
      error:
        type: string
      status:
        $ref: '#/definitions/slot_results.SubmissionStatus'
    type: object
  slot_results.BuildOutcome:
    properties:
      at:
        type: string
      block_hash:
        type: string
      block_value_wei:
        type: string
      error:
        type: string
      fee_recipient:
        type: string
      num_blobs:
        type: integer
      num_transactions:
        type: integer
      skip_reason:
        description: action_plan.BuildSkipReason* when skipped
        type: string
      status:
        $ref: '#/definitions/slot_results.BuildStatus'
    type: object
  slot_results.BuildStatus:
    enum:
    - waiting_attributes
    - no_attributes
    - started
    - ready
    - failed
    - skipped
    type: string
    x-enum-varnames:
    - BuildStatusWaitingAttributes
    - BuildStatusNoAttributes
    - BuildStatusStarted
    - BuildStatusReady
    - BuildStatusFailed
    - BuildStatusSkipped
  slot_results.InclusionResult:
    properties:
      block_hash:
        type: string
      num_blobs:
        type: integer
      num_transactions:
        type: integer
      payload_check_slot:
        description: PayloadCheckSlot is the follow-up block's slot the verdict came
          from.
        type: integer
      payload_status:
        allOf:
        - $ref: '#/definitions/slot_results.PayloadStatus'
        description: |-
          PayloadStatus is the canonical verdict for the won payload: pending
          until the first follow-up block is seen, then canonical or missed based
          on that block's committed parent execution hash. Pre-Gloas wins are
          canonical immediately (the payload is embedded in the block).
      source:
        description: '"epbs" | "builder_api"'
        type: string
      timestamp:
        type: string
      value_eth:
        type: string
      value_wei:
        type: string
    type: object
  slot_results.PayloadStatus:
    enum:
    - pending
    - canonical
    - missed
    - orphaned
    type: string
    x-enum-varnames:
    - PayloadStatusPending
    - PayloadStatusCanonical
    - PayloadStatusMissed
    - PayloadStatusOrphaned
  slot_results.RevealAttempt:
    properties:
      at:
        type: string
      attempt:
        type: integer
      error:
        type: string
      skip_reason:
        description: plan_disabled | disabled | late | vote_gate_timeout
        type: string
      started_at:
        description: |-
          StartedAt is when the attempt began (envelope construction + submit
          call); nil on skips where nothing was attempted.
        type: string
      status:
        $ref: '#/definitions/slot_results.RevealStatus'
      transport:
        type: string
    type: object
  slot_results.RevealStatus:
    enum:
    - suppressed
    - published
    - failed
    - skipped
    type: string
    x-enum-varnames:
    - RevealStatusSuppressed
    - RevealStatusPublished
    - RevealStatusFailed
    - RevealStatusSkipped
  slot_results.SlotResult:
    properties:
      applied_plan:
        allOf:
        - $ref: '#/definitions/action_plan.FrozenPlan'
        description: AppliedPlan is the frozen plan snapshot the slot executed under.
      bids:
        items:
          $ref: '#/definitions/slot_results.BidAttempt'
        type: array
      block_submissions:
        items:
          $ref: '#/definitions/slot_results.BlockSubmission'
        type: array
      build:
        $ref: '#/definitions/slot_results.BuildOutcome'
      dropped_attempts:
        additionalProperties:
          type: integer
        description: |-
          DroppedAttempts counts attempts beyond the per-kind retention cap,
          keyed by kind ("bids", "block_submissions", "reveal_attempts").
        type: object
      epoch:
        type: integer
      fork:
        type: string
      inclusion:
        $ref: '#/definitions/slot_results.InclusionResult'
      reveal_attempts:
        items:
          $ref: '#/definitions/slot_results.RevealAttempt'
        type: array
      slot:
        type: integer
      updated_at:
        type: string
    type: object
  slot_results.SubmissionStatus:
    enum:
    - received
    - accepted
    - failed
    type: string
    x-enum-varnames:
    - SubmissionStatusReceived
    - SubmissionStatusAccepted
    - SubmissionStatusFailed
info:
  contact: {}
paths:
  /api/buildoor/action-plan:
    get:
      description: Returns all per-slot action plans within the inclusive slot range.
      operationId: getActionPlan
      parameters:
      - description: Range start slot (inclusive)
        in: query
        name: min_slot
        required: true
        type: integer
      - description: Range end slot (inclusive)
        in: query
        name: max_slot
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ActionPlanResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Plan service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get per-slot action plans
      tags:
      - ActionPlan
    post:
      consumes:
      - application/json
      description: |-
        Applies a bulk per-slot action plan mutation atomically (all
        targeted slots update or none). Category members are
        three-state (absent = unchanged, null = clear, object =
        replace); the "set" member supports fine-grained path updates
        like {"bid.bid_min_amount": 5000} for partial edits. Updates
        targeting past or already-frozen slots fail with 409.
        Requires authentication.
      operationId: updateActionPlan
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Plan updates
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateActionPlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Authoritative normalized result
          schema:
            $ref: '#/definitions/api.UpdateActionPlanResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Slot in the past or frozen
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Plan service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update per-slot action plans
      tags:
      - ActionPlan
  /api/buildoor/action-plan/test-transform:
    post:
      consumes:
      - application/json
      description: |-
        Runs an operator jq expression against a sample payload / bid /
        envelope (a captured artifact when sample_slot is given and
        available, otherwise a zero-value template of the object) and
        returns the transformed JSON, so expressions can be built and
        tested live before being saved to a slot plan. Bid and envelope
        transforms operate on the MESSAGE, matching production.
      operationId: testActionPlanTransform
      parameters:
      - description: Target, expression and optional sample slot
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.TestTransformRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.TestTransformResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Evaluate a jq transform against a sample builder object
      tags:
      - ActionPlan
  /api/buildoor/audit-log:
    get:
      description: Returns a paginated list of authenticated mutating actions. Empty
        when no state-db is configured.
      operationId: getAuditLog
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 20
        description: Limit for pagination (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.AuditLogResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get the audit log
      tags:
      - Buildoor
  /api/buildoor/bids-won:
    get:
      description: Returns a paginated list of won blocks (Builder API and p2p ePBS)
        with transaction counts, blob counts, and values, read from the shared inclusion
        tracker.
      operationId: getBidsWon
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 20
        description: Limit for pagination (max 100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.BidsWonResponse'
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get bids won (blocks of ours included on chain)
      tags:
      - Buildoor
  /api/buildoor/builder-api-status:
    get:
      description: Returns the current status of the Builder API including configuration
        and validator count.
      operationId: getBuilderAPIStatus
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.BuilderAPIStatusResponse'
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Builder API status
      tags:
      - Buildoor
  /api/buildoor/builder-preferences:
    get:
      description: Returns all builder preferences currently in the cache, submitted
        by proposers via the submitBuilderPreferences API.
      operationId: getBuilderPreferences
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.BuilderPreferencesResponse'
        "404":
          description: Builder API not enabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get cached builder preferences
      tags:
      - Buildoor
  /api/buildoor/head-votes/{slot}:
    get:
      description: |-
        Returns the slot's raw single-attestation arrivals grouped by
        validator-ranges client name into fixed-width time buckets
        from the slot start, plus per-name totals and the count of
        attesters that landed on chain without being seen as singles.
        Only slots still retained by the head vote tracker are served.
      operationId: getHeadVoteDetail
      parameters:
      - description: Slot
        in: path
        name: slot
        required: true
        type: integer
      - description: 'Beacon block root (default: the slot''s primary root)'
        in: query
        name: root
        type: string
      - description: Bucket width in ms (default slot_ms/24, clamped to [50, slot_ms])
        in: query
        name: bucket_ms
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HeadVoteDetailResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No vote detail retained for this slot
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Head vote tracker unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Per-name head-vote arrival heatmap for a slot
      tags:
      - Stats
  /api/buildoor/overview:
    get:
      description: |-
        Returns a single-payload summary used by the multi-instance overview UI:
        running state, builder pubkey, current slot, EL client info, available/enabled
        services, balances, and recent build stats.
      operationId: getOverview
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.OverviewResponse'
      summary: Get a compact overview of this buildoor instance
      tags:
      - Buildoor
  /api/buildoor/proposer-preferences:
    get:
      description: Returns all proposer preferences currently in the cache, received
        via P2P gossip.
      operationId: getProposerPreferences
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.ProposerPreferencesResponse'
        "404":
          description: Proposer preferences not enabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get cached proposer preferences
      tags:
      - Buildoor
  /api/buildoor/slot-results:
    get:
      description: |-
        Returns the recorded outcome history (build, bids, block
        submissions, reveals, inclusion, applied plan) for every
        active slot within the inclusive slot range.
      operationId: getSlotResults
      parameters:
      - description: Range start slot (inclusive)
        in: query
        name: min_slot
        required: true
        type: integer
      - description: Range end slot (inclusive)
        in: query
        name: max_slot
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SlotResultsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Results tracker unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get per-slot results
      tags:
      - ActionPlan
  /api/buildoor/slot-results/{slot}/bids:
    get:
      description: |-
        Lists the metadata of every signed bid stored for the slot
        (JSON only; fetch individual bids by index for SSZ). Returns
        an empty list for slots without bid artifacts.
      operationId: getSlotBidArtifacts
      parameters:
      - description: Slot
        in: path
        name: slot
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SlotBidArtifactsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Results tracker unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List a slot's signed bid artifacts
      tags:
      - ActionPlan
  /api/buildoor/slot-results/{slot}/bids/{index}:
    get:
      description: |-
        Returns one signed bid created for the slot, addressed by its
        artifact index (see the bid listing endpoint). Pre-Gloas bids
        are SignedBuilderBid, Gloas+ bids SignedExecutionPayloadBid.
        Content negotiation as with the payload artifact endpoint.
      operationId: getSlotBidArtifact
      parameters:
      - description: Slot
        in: path
        name: slot
        required: true
        type: integer
      - description: Bid artifact index
        in: path
        name: index
        required: true
        type: integer
      produces:
      - application/json
      - application/octet-stream
      responses:
        "200":
          description: Versioned signed bid (or raw SSZ)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No artifact for this slot/index
          schema:
            additionalProperties:
              type: string
            type: object
        "406":
          description: No acceptable content type
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get one signed bid of a slot
      tags:
      - ActionPlan
  /api/buildoor/slot-results/{slot}/envelope:
    get:
      description: |-
        Returns the signed execution payload envelope constructed for
        the slot's reveal (stored at construction time, so failed
        publishes remain inspectable). Content negotiation as with the
        payload artifact endpoint.
      operationId: getSlotEnvelopeArtifact
      parameters:
      - description: Slot
        in: path
        name: slot
        required: true
        type: integer
      produces:
      - application/json
      - application/octet-stream
      responses:
        "200":
          description: Versioned envelope (or raw SSZ)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No artifact for this slot
          schema:
            additionalProperties:
              type: string
            type: object
        "406":
          description: No acceptable content type
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get the signed payload envelope of a slot
      tags:
      - ActionPlan
  /api/buildoor/slot-results/{slot}/payload:
    get:
      description: |-
        Returns the exact execution payload built for the slot. With
        "Accept: application/octet-stream" the raw SSZ bytes are
        served; otherwise a {"version", "data"} JSON envelope. The
        Eth-Consensus-Version response header carries the fork name.
      operationId: getSlotPayloadArtifact
      parameters:
      - description: Slot
        in: path
        name: slot
        required: true
        type: integer
      produces:
      - application/json
      - application/octet-stream
      responses:
        "200":
          description: Versioned payload (or raw SSZ)
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No artifact for this slot
          schema:
            additionalProperties:
              type: string
            type: object
        "406":
          description: No acceptable content type
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get the built execution payload of a slot
      tags:
      - ActionPlan
  /api/buildoor/validators:
    get:
      description: Returns the list of validators registered via the Builder API (fee
        recipient preferences). Not paginated.
      operationId: getValidators
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.GetValidatorsResponse'
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List registered validators
      tags:
      - Buildoor
  /api/config:
    get:
      description: Returns the buildoor configuration in use. Sensitive fields (builder
        key, wallet key, JWT secret) are redacted.
      operationId: getConfig
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get buildoor configuration
      tags:
      - Config
  /api/config/epbs:
    post:
      consumes:
      - application/json
      description: |-
        Updates the EPBS (enshrined PBS) configuration including timing and bid
        parameters. Requires authentication.
      operationId: updateEPBS
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: EPBS configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateEPBSRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update EPBS configuration
      tags:
      - Config
  /api/config/schedule:
    post:
      consumes:
      - application/json
      description: |-
        Updates the builder schedule configuration including mode, every_nth, and next_n
        settings. Requires authentication.
      operationId: updateSchedule
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Schedule configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.UpdateScheduleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update schedule configuration
      tags:
      - Config
  /api/config/settings:
    post:
      consumes:
      - application/json
      description: |-
        Applies partial global settings updates keyed by canonical
        settings paths (e.g. {"epbs.bid_subsidy": 1000,
        "schedule.mode": "all"}) without requiring full config
        objects. Unknown keys are rejected. Requires authentication.
      operationId: updateSettings
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Map of settings key paths to values
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Unknown key or invalid value
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update global settings by key path
      tags:
      - Config
  /api/lifecycle/deposit:
    post:
      consumes:
      - application/json
      description: |-
        Initiates a builder registration deposit. If the builder is not yet
        registered, this will register it with the specified amount. Requires authentication.
      operationId: postDeposit
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Deposit amount in gwei
        in: body
        name: request
        required: true
        schema:
          properties:
            amount_gwei:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Lifecycle management not enabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger builder deposit
      tags:
      - Lifecycle
  /api/lifecycle/exit:
    post:
      consumes:
      - application/json
      description: |-
        Initiates a voluntary exit for the builder. This will begin the withdrawal
        process and the builder will stop being eligible for block building after
        the exit is processed. Requires authentication.
      operationId: postExit
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Lifecycle management not enabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger voluntary exit
      tags:
      - Lifecycle
  /api/lifecycle/status:
    get:
      description: |-
        Returns the builder lifecycle status including registration state, balance,
        pending payments, and epoch information.
      operationId: getLifecycleStatus
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.LifecycleStatusResponse'
        "404":
          description: Lifecycle management not enabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get lifecycle status
      tags:
      - Lifecycle
  /api/lifecycle/topup:
    post:
      consumes:
      - application/json
      description: |-
        Checks the builder balance and initiates a top-up if needed based on
        configured thresholds. Requires authentication.
      operationId: postTopup
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Lifecycle management not enabled
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Trigger balance top-up
      tags:
      - Lifecycle
  /api/stats:
    get:
      description: |-
        Returns builder statistics including slots built, bids submitted/won,
        total paid, and reveal success/failure counts.
      operationId: getStats
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.StatsResponse'
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get builder statistics
      tags:
      - Stats
  /api/status:
    get:
      description: |-
        Returns the current builder status including running state, current slot,
        builder index and public key.
      operationId: getStatus
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/api.StatusResponse'
        "500":
          description: Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get builder status
      tags:
      - Status
  /api/version:
    get:
      description: Returns the current version
      operationId: getVersion
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            type: string
        "500":
          description: Server Error
          schema:
            type: string
      summary: Get the current version
      tags:
      - Version
swagger: "2.0"
