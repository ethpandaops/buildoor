definitions:
  action_plan.BidPlan:
    properties:
      bid_end_time:
        type: integer
      bid_increase:
        description: gwei
        type: integer
      bid_interval:
        description: ms, >= 0, 0 = single bid
        type: integer
      bid_min_amount:
        description: gwei
        type: integer
      bid_start_time:
        type: integer
      bid_subsidy:
        description: gwei
        type: integer
      bid_value_gwei:
        description: |-
          BidValueGwei is an absolute bid base value replacing
          max(blockValue, min) + subsidy; BidIncrease still applies per re-bid.
          Allows underbidding the block value for testing.
        type: integer
      ignore_missing_prefs:
        description: |-
          IgnoreMissingPrefs bids with the payload's fee recipient when no gossip
          proposer preferences arrived for the slot, bypassing the skip gate.
        type: boolean
      mode:
        $ref: '#/definitions/action_plan.Mode'
    type: object
  action_plan.BuildPlan:
    properties:
      reorg_parent_payload:
        description: |-
          ReorgParentPayload builds on the grandparent (n-2) execution payload
          instead of the immediate parent: the FCU head block hash and the payload
          attributes' withdrawals are taken from the PARENT slot's payload
          attributes (whose parent is n-2), while every other property comes from
          the current slot. This is a deliberate parent-payload reorg attempt —
          rejected by mainnet forkchoice, but useful for exercising the reveal /
          inclusion path against a withheld parent.
        type: boolean
    type: object
  action_plan.BuilderAPIPlan:
    properties:
      mode:
        $ref: '#/definitions/action_plan.Mode'
      response_delay_ms:
        description: |-
          ResponseDelayMs delays the bid response by this many milliseconds
          (context-cancellable, capped at one slot).
        type: integer
      total_value_override_gwei:
        description: |-
          TotalValueOverrideGwei is the absolute total proposer-visible bid value
          (before the Gloas execution-payment split), replacing block value +
          subsidy. May exceed the block value to test payment edge cases.
        type: integer
      value_subsidy_gwei:
        description: ValueSubsidyGwei replaces the global BlockValueSubsidyGwei for
          this slot.
        type: integer
    type: object
  action_plan.FrozenPlan:
    properties:
      bid:
        allOf:
        - $ref: '#/definitions/action_plan.ResolvedBidSettings'
        description: |-
          Resolved effective settings; a nil category = suppressed for this slot
          (by plan or by the global enable flags / protocol applicability).
      build:
        allOf:
        - $ref: '#/definitions/action_plan.ResolvedBuildSettings'
        description: |-
          Build is the complete resolved build decision for the slot (schedule +
          plan force/suppress). Always non-nil.
      builder_api:
        $ref: '#/definitions/action_plan.ResolvedBuilderAPISettings'
      fork:
        description: fork name at the target slot
        type: string
      frozen_at:
        type: string
      plan:
        allOf:
        - $ref: '#/definitions/action_plan.SlotPlan'
        description: raw sparse plan; nil = none existed
      reveal:
        $ref: '#/definitions/action_plan.ResolvedRevealSettings'
      slot:
        type: integer
      transforms:
        allOf:
        - $ref: '#/definitions/action_plan.ResolvedTransforms'
        description: |-
          Transforms carries the effective jq transform expressions (empty when no
          transform plan applies). Nil only when no plan expression is set.
    type: object
  action_plan.Mode:
    enum:
    - disabled
    - custom
    type: string
    x-enum-varnames:
    - ModeDisabled
    - ModeCustom
  action_plan.PlanUpdate:
    properties:
      bid:
        items:
          type: integer
        type: array
      build:
        items:
          type: integer
        type: array
      builder_api:
        items:
          type: integer
        type: array
      delete:
        type: boolean
      from_slot:
        type: integer
      reveal:
        items:
          type: integer
        type: array
      set:
        additionalProperties:
          items:
            type: integer
          type: array
        type: object
      slots:
        items:
          type: integer
        type: array
      to_slot:
        type: integer
      transforms:
        items:
          type: integer
        type: array
    type: object
  action_plan.ResolvedBidSettings:
    properties:
      end_ms:
        type: integer
      forced:
        description: |-
          Forced marks that the plan activated bidding although the module is
          globally disabled.
        type: boolean
      ignore_missing_prefs:
        description: IgnoreMissingPrefs bids without gossip proposer preferences.
        type: boolean
      increase_gwei:
        type: integer
      interval_ms:
        type: integer
      min_gwei:
        type: integer
      start_ms:
        type: integer
      subsidy_gwei:
        type: integer
      value_gwei:
        description: |-
          ValueGwei, when set, is the absolute bid base value replacing the
          max(blockValue, min) + subsidy formula (IncreaseGwei still applies).
        type: integer
    type: object
  action_plan.ResolvedBuildSettings:
    properties:
      build:
        description: 'Build is the final decision: build a payload for this slot or
          not.'
        type: boolean
      build_start_time_ms:
        description: |-
          BuildStartTimeMs is the effective build start time, milliseconds
          relative to slot start (signed).
        type: integer
      forced:
        description: |-
          Forced marks builds the plan pushed past the schedule (they never
          consume the next_n budget).
        type: boolean
      plan_involved:
        description: |-
          PlanInvolved marks decisions where a per-slot plan existed or any
          consumer was effectively active — i.e. skips worth surfacing.
        type: boolean
      reorg_parent_payload:
        description: |-
          ReorgParentPayload builds the slot's payload on the grandparent (n-2)
          execution payload instead of the immediate parent — a deliberate
          parent-payload reorg attempt (see BuildPlan.ReorgParentPayload).
        type: boolean
      skip_reason:
        description: |-
          SkipReason is one of the BuildSkipReason* constants when Build is
          false, empty otherwise.
        type: string
    type: object
  action_plan.ResolvedBuilderAPISettings:
    properties:
      delay_ms:
        type: integer
      forced:
        description: |-
          Forced marks that the plan activated serving although the module is
          globally disabled.
        type: boolean
      subsidy_gwei:
        type: integer
      total_value_gwei:
        description: |-
          TotalValueGwei, when set, is the absolute total proposer-visible bid
          value (before the Gloas execution-payment split).
        type: integer
    type: object
  action_plan.ResolvedRevealSettings:
    properties:
      broadcast_validation:
        description: |-
          BroadcastValidation is the envelope submission's broadcast_validation
          level: gossip | consensus | consensus_and_equivocation.
        type: string
      bypass_deadline:
        description: |-
          BypassDeadline disables the "past the in-slot deadline → skip" check so
          deliberately late reveals are attempted.
        type: boolean
      gate_mode:
        description: |-
          GateMode decides the reveal moment: time | vote | vote_or_time |
          vote_and_time.
        type: string
      max_attempts:
        description: |-
          MaxAttempts / RetryIntervalMs are the publish retry policy
          (global-only, no per-slot override).
        type: integer
      retry_interval_ms:
        type: integer
      reveal_time_ms:
        type: integer
      suppressed:
        type: boolean
      vote_threshold_pct:
        description: |-
          VoteThresholdPct is the participation threshold (percent) opening the
          vote gate.
        type: integer
    type: object
  action_plan.ResolvedTransforms:
    properties:
      bid:
        type: string
      envelope:
        type: string
      payload:
        type: string
    type: object
  action_plan.RevealPlan:
    properties:
      broadcast_validation:
        description: |-
          BroadcastValidation overrides the envelope submission's broadcast
          validation level: gossip | consensus | consensus_and_equivocation.
        type: string
      gate_mode:
        description: |-
          GateMode overrides the reveal gate: time | vote | vote_or_time |
          vote_and_time.
        type: string
      mode:
        $ref: '#/definitions/action_plan.Mode'
      reveal_time_ms:
        description: RevealTimeMs is signed milliseconds relative to slot start (time
          gate).
        type: integer
      vote_threshold_pct:
        description: VoteThresholdPct overrides the vote gate's participation threshold.
        type: integer
    type: object
  action_plan.SlotPlan:
    properties:
      bid:
        $ref: '#/definitions/action_plan.BidPlan'
      build:
        $ref: '#/definitions/action_plan.BuildPlan'
      builder_api:
        $ref: '#/definitions/action_plan.BuilderAPIPlan'
      reveal:
        $ref: '#/definitions/action_plan.RevealPlan'
      slot:
        type: integer
      transforms:
        $ref: '#/definitions/action_plan.TransformPlan'
      updated_at:
        type: string
      updated_by:
        type: string
    type: object
  action_plan.TransformPlan:
    properties:
      bid:
        type: string
      envelope:
        type: string
      payload:
        type: string
    type: object
  api.ActionPlanResponse:
    properties:
      max_slot:
        type: integer
      min_slot:
        type: integer
      plans:
        items:
          $ref: '#/definitions/action_plan.SlotPlan'
        type: array
    type: object
  api.AuditLogResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/db.AuditLog'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  api.BidArtifactMetaEntry:
    properties:
      at:
        description: unix milliseconds
        type: integer
      execution_payment_gwei:
        type: integer
      fork:
        type: string
      index:
        type: integer
      total_value_gwei:
        type: integer
      transport:
        type: string
    type: object
  api.BidsWonResponse:
    properties:
      bids_won:
        items:
          $ref: '#/definitions/payload_bidder.WonBlock'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  api.BuilderAPIStatusResponse:
    properties:
      block_value_subsidy_gwei:
        type: integer
      enabled:
        type: boolean
      validator_count:
        type: integer
    type: object
  api.BuilderPreferencesEntry:
    properties:
      max_execution_payment:
        type: integer
      validator_pubkey:
        type: string
    type: object
  api.BuilderPreferencesResponse:
    properties:
      preferences:
        items:
          $ref: '#/definitions/api.BuilderPreferencesEntry'
        type: array
    type: object
  api.GetValidatorsResponse:
    properties:
      validators:
        items:
          $ref: '#/definitions/api.ValidatorRegistrationResponse'
        type: array
    type: object
  api.HeadVoteDetailResponse:
    properties:
      bucket_count:
        type: integer
      bucket_ms:
        type: integer
      root:
        type: string
      rows:
        items:
          $ref: '#/definitions/api.HeadVoteDetailRow'
        type: array
      slot:
        type: integer
      slot_start_ms:
        type: integer
      total_members:
        type: integer
    type: object
  api.HeadVoteDetailRow:
    properties:
      counts:
        items:
          type: integer
        type: array
      in_block_unseen:
        type: integer
      members:
        type: integer
      name:
        type: string
      seen:
        type: integer
    type: object
  api.LifecycleStatusResponse:
    properties:
      balance_gwei:
        type: integer
      builder_index:
        type: integer
      deposit_epoch:
        type: integer
      effective_balance_gwei:
        type: integer
      is_registered:
        type: boolean
      pending_payments_gwei:
        type: integer
      withdrawable_epoch:
        type: integer
    type: object
  api.OverviewBalances:
    properties:
      cl_balance_gwei:
        type: integer
      effective_balance_gwei:
        type: integer
      pending_payments_gwei:
        type: integer
      wallet_address:
        type: string
      wallet_balance_wei:
        type: string
    type: object
  api.OverviewELClient:
    properties:
      code:
        type: string
      commit:
        type: string
      name:
        type: string
      version:
        type: string
    type: object
  api.OverviewResponse:
    properties:
      balances:
        $ref: '#/definitions/api.OverviewBalances'
      builder_index:
        type: integer
      builder_pubkey:
        type: string
      current_slot:
        type: integer
      el_client:
        $ref: '#/definitions/api.OverviewELClient'
      is_registered:
        type: boolean
      running:
        type: boolean
      services:
        $ref: '#/definitions/api.OverviewServices'
      stats:
        $ref: '#/definitions/api.OverviewStats'
      version:
        type: string
    type: object
  api.OverviewServices:
    properties:
      builder_api_available:
        type: boolean
      builder_api_enabled:
        type: boolean
      epbs_available:
        type: boolean
      epbs_enabled:
        type: boolean
      epbs_registration_state:
        type: string
      lifecycle_available:
        type: boolean
      lifecycle_enabled:
        type: boolean
    type: object
  api.OverviewStats:
    properties:
      bids_submitted:
        type: integer
      bids_won:
        type: integer
      blocks_included:
        type: integer
      builder_api_blocks_published:
        type: integer
      builder_api_headers_requested:
        type: integer
      builder_api_registered_validators:
        type: integer
      slots_built:
        type: integer
    type: object
  api.ProposerPreferencesEntry:
    properties:
      client_name:
        type: string
      fee_recipient:
        type: string
      slot:
        type: integer
      target_gas_limit:
        type: integer
      validator_index:
        type: integer
    type: object
  api.ProposerPreferencesResponse:
    properties:
      preferences:
        items:
          $ref: '#/definitions/api.ProposerPreferencesEntry'
        type: array
    type: object
  api.SlotBidArtifactsResponse:
    properties:
      bids:
        items:
          $ref: '#/definitions/api.BidArtifactMetaEntry'
        type: array
      slot:
        type: integer
    type: object
  api.SlotResultsResponse:
